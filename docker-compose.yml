services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thesisx
      POSTGRES_PASSWORD: thesisx
      POSTGRES_DB: thesisx
    ports:
      - "5432:5432"
    volumes:
      - thesisx_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - thesisx_redis:/data

volumes:
  thesisx_pg:
  thesisx_redis:
